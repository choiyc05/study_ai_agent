services:
  master:
    container_name: master
    image: my-spark:0.5
    ports:
      - 8080:8080
      - 7077:7077
    environment:
      - SPARK_PUBLIC=localhost
      - SPARK_MODE=master
    command: start-master.sh
  worker:
    container_name: spark-worker
    image: my-spark:0.5
    depends_on:
      - master
    environment:
      - SPARK_PUBLIC_DNS=localhost
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://master:7077
    command: start-worker.sh spark://master:7077
